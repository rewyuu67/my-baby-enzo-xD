<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>I LOVE MY BABY ENZO</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

/* MAIN TEXT */
.text{
    position:relative;
    font-size:90px;
    font-weight:bold;
    color:white;
    text-align:center;
    letter-spacing:6px;
    text-transform:uppercase;

    animation: glow 2s ease-in-out infinite alternate;
}

/* GLOW EFFECT */
.text::before{
    content:"I LOVE MY BABY ENZO";
    position:absolute;
    left:0;
    top:0;
    z-index:-1;

    color:#ff4da6;

    filter:blur(30px);
}

/* TEXT GLOW ANIMATION */
@keyframes glow{
    from{
        text-shadow:
        0 0 10px #ff4da6,
        0 0 20px #ff4da6,
        0 0 40px #ff4da6,
        0 0 80px #ff4da6;
    }

    to{
        text-shadow:
        0 0 20px #ff99cc,
        0 0 40px #ff99cc,
        0 0 80px #ff99cc,
        0 0 120px #ff99cc;
    }
}

/* HEART CONTAINER */
.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* HEART STYLE */
.heart{
    position:absolute;
    bottom:-100px;

    color:#ff4da6;

    font-size:70px;

    text-shadow:
    0 0 10px #ff4da6,
    0 0 20px #ff4da6,
    0 0 40px #ff4da6,
    0 0 80px #ff4da6;

    animation: float linear forwards;
}

/* FLOATING HEARTS */
@keyframes float{
    0%{
        transform:translateY(0) scale(0.8);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
    }
}

/* PC LOOK */
@media (max-width:768px){
    .text{
        font-size:40px;
        padding:20px;
    }

    .heart{
        font-size:40px;
    }
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="text">
    I LOVE MY BABY ENZO
</div>

<script>
const heartsContainer = document.querySelector('.hearts');

function createHeart(){

    const heart = document.createElement('div');

    heart.classList.add('heart');

    heart.innerHTML = '❤';

    heart.style.left = Math.random() * 100 + 'vw';

    heart.style.animationDuration =
        (4 + Math.random() * 5) + 's';

    heart.style.fontSize =
        (60 + Math.random() * 60) + 'px';

    heartsContainer.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 9000);
}

setInterval(createHeart, 120);
</script>

</body>
  </html>
