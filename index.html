<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I LOVE MY BABY ENZO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    height:100vh;
    width:100%;
    font-family:Arial, sans-serif;
}

/* CENTER TEXT */

.center-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    
    color:white;
    font-size:80px;
    font-weight:bold;
    letter-spacing:5px;
    text-align:center;

    text-shadow:
    0 0 10px #ff6699,
    0 0 20px #ff6699,
    0 0 40px #ff6699,
    0 0 80px #ff6699;
}

/* FLOATING TEXT HEARTS */

.hearts{
    position:absolute;
    width:100%;
    height:100%;
}

.heart{
    position:absolute;

    font-size:28px;
    font-weight:bold;

    white-space:nowrap;

    animation: floatUp linear forwards;

    opacity:0;
}

/* FLOWING UP */

@keyframes floatUp{

    0%{
        transform:
        translateY(0)
        scale(0.8)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(-130vh)
        scale(1.2)
        rotate(6deg);

        opacity:0;
    }
}

/* MOBILE */

@media(max-width:768px){

    .center-text{
        font-size:38px;
        width:90%;
    }

    .heart{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="center-text">
    I LOVE MY BABY ENZO
</div>

<script>

const container = document.querySelector('.hearts');

const colors = [
    "#ff4d4d",
    "#ff944d",
    "#ff66b3",
    "#ff3366",
    "#ff9966"
];

function createHeartText(){

    const heart = document.createElement('div');

    heart.classList.add('heart');

    heart.innerHTML = "I LOVE MY BABY ENZO ❤";

    /* RANDOM POSITION */

    heart.style.left =
        Math.random() * 100 + "vw";

    /* RANDOM SIZE */

    heart.style.fontSize =
        (20 + Math.random() * 22) + "px";

    /* RANDOM SPEED */

    heart.style.animationDuration =
        (5 + Math.random() * 5) + "s";

    /* RANDOM COLOR */

    const color =
        colors[Math.floor(Math.random() * colors.length)];

    heart.style.color = color;

    /* GLOW */

    heart.style.textShadow = `
        0 0 8px ${color},
        0 0 15px ${color},
        0 0 30px ${color}
    `;

    container.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 10000);
}

/* SPAWN */

setInterval(createHeartText, 120);

</script>

</body>
</html>
