<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>I Love You Enzo</title>



<style>

    *{

        margin:0;

        padding:0;

        box-sizing:border-box;

    }



    body{

        height:100vh;

        overflow:hidden;

        display:flex;

        justify-content:center;

        align-items:center;

        background:black;

        font-family:Arial, sans-serif;

    }



    h1{

        position:relative;

        color:#fff;

        font-size:70px;

        letter-spacing:5px;

        text-transform:uppercase;

        animation: glow 2s ease-in-out infinite alternate;

    }



    h1::before{

        content:"I LOVE YOU ENZO";

        position:absolute;

        left:0;

        top:0;

        color:#ff0055;

        z-index:-1;

        filter:blur(20px);

    }



    @keyframes glow{

        from{

            text-shadow:

            0 0 10px #ff0055,

            0 0 20px #ff0055,

            0 0 40px #ff0055;

        }



        to{

            text-shadow:

            0 0 20px #ff66aa,

            0 0 40px #ff66aa,

            0 0 80px #ff66aa;

        }

    }



    .hearts{

        position:absolute;

        width:100%;

        height:100%;

        overflow:hidden;

    }



    .heart{

        position:absolute;

        color:#ff0055;

        font-size:20px;

        animation: float 6s linear infinite;

    }



    @keyframes float{

        0%{

            transform:translateY(100vh) scale(0);

            opacity:0;

        }



        50%{

            opacity:1;

        }



        100%{

            transform:translateY(-10vh) scale(1.5);

            opacity:0;

        }

    }

</style>

</head>



<body>



<div class="hearts"></div>



<h1>I LOVE YOU ENZO</h1>



<script>

    const hearts = document.querySelector('.hearts');



    function createHeart(){

        const heart = document.createElement('div');

        heart.classList.add('heart');

        heart.innerHTML = '❤';



        heart.style.left = Math.random() * 100 + 'vw';

        heart.style.animationDuration = 3 + Math.random() * 5 + 's';

        heart.style.fontSize = 15 + Math.random() * 30 + 'px';



        hearts.appendChild(heart);



        setTimeout(() => {

            heart.remove();

        }, 8000);

    }



    setInterval(createHeart, 200);

</script>



</body>

</html>
