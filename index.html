<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i love my baby enzo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

h1{
    color:white;
    font-size:75px;
    letter-spacing:4px;
    position:relative;
    animation:glow 2s ease-in-out infinite alternate;
    text-align:center;
}

h1::before{
    content:"i love my baby enzo ♡";
    position:absolute;
    left:0;
    top:0;
    z-index:-1;
    color:#ff4da6;
    filter:blur(25px);
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #ff4da6,
        0 0 20px #ff4da6,
        0 0 40px #ff4da6;
    }

    to{
        text-shadow:
        0 0 20px #ff99cc,
        0 0 50px #ff99cc,
        0 0 90px #ff99cc;
    }
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
}

.heart{
    position:absolute;
    bottom:-50px;
    color:#ff4da6;
    animation:float linear forwards;
    user-select:none;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(0.8);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.3);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="hearts"></div>

<h1>i love my baby enzo ♡</h1>

<script>
const container = document.querySelector('.hearts');

function createHeart(){
    const heart = document.createElement('div');
    heart.classList.add('heart');

    heart.innerHTML = '❤';

    heart.style.left = Math.random() * 100 + 'vw';

    heart.style.fontSize = (40 + Math.random() * 50) + 'px';

    heart.style.animationDuration = (4 + Math.random() * 4) + 's';

    container.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

setInterval(createHeart, 150);
</script>

</body>
</html>
